.wrap{padding:.75rem 0}
.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.mbtn{padding:6px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary)}
.mbtn.on{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.day-grid{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.db{padding:5px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);min-width:36px;text-align:center}
.db.cur{background:#534AB7;color:#fff;border-color:#534AB7}
.db.done{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success)}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:10px}
.st{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;font-size:11px;color:var(--color-text-secondary);text-align:center}
.st b{display:block;font-size:20px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
.pbar{height:5px;background:var(--color-background-secondary);border-radius:3px;margin-bottom:12px;overflow:hidden}
.pfill{height:100%;background:#534AB7;border-radius:3px;transition:width .3s}
.card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem 1rem;text-align:center;cursor:pointer;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;margin-bottom:10px;user-select:none;-webkit-tap-highlight-color:transparent}
.card:active{background:var(--color-background-secondary)}

.cnt{font-size:13px;color:var(--color-text-secondary);min-width:55px;text-align:center}
.arow{display:flex;gap:8px;justify-content:center;margin-top:4px}

.bk:active{background:#0F6E56}
.bs{padding:12px 0;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:14px;cursor:pointer;flex:1;max-width:160px}

<h2 class="sr-only">Flashcard 1000 kosakata JFT N4, dibagi 50 kata per hari selama 20 hari. Ketuk kartu untuk melihat arti.</h2>

<div class="wrap">
<div class="row">
  <button class="mbtn on" id="mf" onclick="setM('f')">Flashcard</button>
  <button class="mbtn" id="ml" onclick="setM('l')">Daftar</button>
</div>
<div class="day-grid" id="dg"></div>
<div class="stats">
  <div class="st"><b id="sT">50</b>Total</div>
  <div class="st"><b id="sK">0</b>Hafal</div>
  <div class="st"><b id="sL">50</b>Sisa</div>
</div>
<div class="pbar"><div class="pfill" id="pf" style="width:0%"></div></div>

<div id="fMode">

    <div class="crd" id="cR"></div>
    <div class="crom" id="cRom"></div>
    <div class="chint" id="cH">ketuk untuk lihat arti</div>
    <div class="cmean" id="cM" style="display:none"></div>
    <div class="ctype" id="cTp"></div>
  </div>

    <button onclick="prev()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Prev</button>
    <span class="cnt" id="ct">1 / 50</span>
    <button onclick="next()">Next <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
  </div>
  <div class="arow" id="ar" style="display:none">
    <button class="bk" onclick="markK()"><i class="ti ti-check" aria-hidden="true"></i> Hafal</button>
    <button class="bs" onclick="next()">Lewati</button>
  </div>
</div>

<div id="lMode" style="display:none;overflow-x:auto">

    <thead><tr><th>Kanji</th><th>Romaji</th><th>Arti</th><th>Level</th></tr></thead>
    <tbody id="lb"></tbody>
  </table>
</div>
</div>

const PD=50,TD=20;
let day=1,idx=0,flipped=false,known={},mode='f';

function dv(d){return V.slice((d-1)*PD,d*PD);}

function rDays(){
  const el=document.getElementById('dg');
  el.innerHTML='';
  for(let d=1;d<=TD;d++){
    const v=dv(d),k=v.filter((_,i)=>known[(d-1)*PD+i]).length;
    const b=document.createElement('button');
    b.className='db'+(d===day?' cur':'')+(k===PD?' done':'');
    b.textContent='H'+d;
    b.onclick=(d=>{return()=>selDay(d);})(d);
    el.appendChild(b);
  }
}

function selDay(d){day=d;idx=0;flipped=false;rDays();rCard();uStats();if(mode==='l')rList();}

function uStats(){
  const v=dv(day),k=v.filter((_,i)=>known[(day-1)*PD+i]).length;
  document.getElementById('sT').textContent=PD;
  document.getElementById('sK').textContent=k;
  document.getElementById('sL').textContent=PD-k;
  document.getElementById('pf').style.width=Math.round(k/PD*100)+'%';
}

function rCard(){
  const w=dv(day)[idx];
  const rom=toRom(w[1]);
  document.getElementById('cJ').textContent=w[0];
  document.getElementById('cR').textContent=w[1]!==w[0]?w[1]:'';
  document.getElementById('cRom').textContent=(rom&&rom!==w[1])?rom:'';
  document.getElementById('cH').textContent=flipped?'':'ketuk untuk lihat arti';
  document.getElementById('cM').style.display=flipped?'block':'none';
  document.getElementById('cM').textContent=w[2];
  document.getElementById('cTp').textContent=flipped?(w[3]+' · '+w[4]):'';
  document.getElementById('ct').textContent=(idx+1)+' / '+PD;
  document.getElementById('ar').style.display=flipped?'flex':'none';
  document.getElementById('cd').style.opacity=known[(day-1)*PD+idx]?'0.5':'1';
}

function flip(){flipped=!flipped;rCard();}
function next(){if(idx<PD-1){idx++;flipped=false;rCard();}}
function prev(){if(idx>0){idx--;flipped=false;rCard();}}
function markK(){known[(day-1)*PD+idx]=true;uStats();rDays();next();}

function setM(m){
  mode=m;
  document.getElementById('mf').className='mbtn'+(m==='f'?' on':'');
  document.getElementById('ml').className='mbtn'+(m==='l'?' on':'');
  document.getElementById('fMode').style.display=m==='f'?'block':'none';
  document.getElementById('lMode').style.display=m==='l'?'block':'none';
  if(m==='l')rList();
}

function rList(){
  const v=dv(day),tb=document.getElementById('lb');
  tb.innerHTML='';
  v.forEach((w,i)=>{
    const gi=(day-1)*PD+i,tr=document.createElement('tr');
    if(known[gi])tr.className='kn';
    const rom=toRom(w[1]);
    tr.innerHTML=`<td><span class="jp-cell">${w[0]}</span><span class="rom-tag">${w[1]}</span></td><td style="color:var(--color-text-secondary);font-size:12px">${rom}</td><td>${w[2]}</td><td><span class="badge b${w[4].toLowerCase()}">${w[4]}</span></td>`;
    tr.onclick=()=>{known[gi]=!known[gi];uStats();rList();rDays();};
    tb.appendChild(tr);
  });
}

rDays();rCard();uStats();
</script>
