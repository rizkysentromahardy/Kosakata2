<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JFT N4 Flashcard — 1000 Kosakata</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --surface: #18181c;
  --surface2: #222228;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f2;
  --muted: #8a8a96;
  --hint: #55555f;
  --purple: #7c6fff;
  --purple-dim: #3d3880;
  --green: #3ecf8e;
  --green-dim: #1a4a36;
  --red: #f06060;
  --amber: #f5a623;
  --n5: #3b82f6;
  --n5-bg: rgba(59,130,246,0.12);
  --n4: #7c6fff;
  --n4-bg: rgba(124,111,255,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--purple);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; font-weight: 700; color: #fff;
}
.logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
.logo-sub { font-size: 12px; color: var(--muted); }
.header-stats { display: flex; gap: 16px; }
.hstat { text-align: right; }
.hstat-val { font-size: 18px; font-weight: 600; color: var(--purple); }
.hstat-lbl { font-size: 11px; color: var(--muted); }

.main { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 200px;
  border-right: 1px solid var(--border);
  padding: 1rem;
  overflow-y: auto;
  flex-shrink: 0;
}
.sidebar-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.day-list { display: flex; flex-direction: column; gap: 3px; }
.day-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--muted);
  border: 1px solid transparent;
  transition: all 0.15s;
}
.day-item:hover { background: var(--surface); color: var(--text); }
.day-item.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }
.day-item.done { color: var(--green); }
.day-item.done .day-dot { background: var(--green); }
.day-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--hint); flex-shrink: 0; }
.day-item.active .day-dot { background: var(--purple); }

.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.tab-group { display: flex; gap: 4px; background: var(--surface); border-radius: 8px; padding: 3px; }
.tab {
  padding: 5px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;
  color: var(--muted); border: none; background: transparent; font-family: inherit;
  transition: all 0.15s;
}
.tab.active { background: var(--surface2); color: var(--text); }
.progress-wrap { flex: 1; min-width: 120px; }
.progress-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
.progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--purple); border-radius: 2px; transition: width 0.4s; }
.stats-row { display: flex; gap: 8px; }
.stat-pill {
  padding: 4px 10px; border-radius: 20px; font-size: 12px;
  background: var(--surface); border: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px;
}
.stat-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-green { background: var(--green); }
.dot-amber { background: var(--amber); }

.flash-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem 1.5rem; gap: 20px;
}
.flashcard {
  width: 100%; max-width: 500px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 3rem 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.1s;
  user-select: none;
  min-height: 240px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
}
.flashcard:hover { border-color: rgba(124,111,255,0.4); }
.flashcard:active { transform: scale(0.99); }
.flashcard.known { opacity: 0.5; }
.card-jp {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 48px; font-weight: 700;
  color: var(--text); line-height: 1.2;
}
.card-hira {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 18px; color: var(--muted);
}
.card-romaji { font-size: 13px; color: var(--hint); font-style: italic; }
.card-tap { font-size: 12px; color: var(--hint); margin-top: 6px; }
.card-meaning { font-size: 26px; font-weight: 600; color: var(--purple); margin-top: 4px; }
.card-meta { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 4px; }
.badge {
  padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500;
}
.badge-n5 { background: var(--n5-bg); color: var(--n5); }
.badge-n4 { background: var(--n4-bg); color: var(--n4); }
.badge-type { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

.nav-row { display: flex; gap: 10px; align-items: center; }
.nav-btn {
  padding: 9px 20px; border-radius: 10px;
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--text); font-size: 14px; cursor: pointer;
  font-family: inherit; transition: background 0.15s;
}
.nav-btn:hover { background: var(--surface2); }
.counter { font-size: 14px; color: var(--muted); min-width: 70px; text-align: center; }
.action-row { display: flex; gap: 10px; }
.btn-know {
  padding: 10px 28px; border-radius: 10px; border: none;
  background: var(--green); color: #0a2a1e;
  font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: opacity 0.15s;
}
.btn-know:hover { opacity: 0.85; }
.btn-skip {
  padding: 10px 22px; border-radius: 10px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted); font-size: 14px; cursor: pointer; font-family: inherit;
  transition: background 0.15s;
}
.btn-skip:hover { background: var(--surface); }
.keyboard-hint { font-size: 11px; color: var(--hint); text-align: center; }

.list-area { flex: 1; overflow-y: auto; padding: 0 1.5rem 1.5rem; }
.vocab-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.vocab-table th {
  text-align: left; padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--muted); font-weight: 500; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.06em;
  position: sticky; top: 0; background: var(--bg); z-index: 1;
}
.vocab-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
.vocab-table tr:hover td { background: var(--surface); cursor: pointer; }
.vocab-table tr.kn td { color: var(--hint); }
.vocab-table tr.kn .cell-jp { text-decoration: line-through; }
.cell-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 500; }
.cell-hira { font-family: 'Noto Sans JP', sans-serif; color: var(--muted); }
.cell-romaji { color: var(--hint); font-style: italic; }

@media (max-width: 640px) {
  .sidebar { display: none; }
  .card-jp { font-size: 36px; }
  .flashcard { padding: 2rem 1rem; min-height: 200px; }
  .header-stats { display: none; }
}

.empty-day { text-align: center; color: var(--muted); padding: 4rem; font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">日</div>
    <div>
      <div class="logo-text">JFT N4 Flashcard</div>
      <div class="logo-sub">1000 kosakata · 20 hari</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-val" id="totalKnown">0</div>
      <div class="hstat-lbl">Total hafal</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="totalPct">0%</div>
      <div class="hstat-lbl">Progress</div>
    </div>
  </div>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-title">Hari belajar</div>
    <div class="day-list" id="dayList"></div>
  </aside>

  <div class="content">
    <div class="toolbar">
      <div class="tab-group">
        <button class="tab active" id="tabFlash" onclick="setMode('flash')">Flashcard</button>
        <button class="tab" id="tabList" onclick="setMode('list')">Daftar</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="progLabel">Hari 1</span>
          <span id="progPct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
      </div>
      <div class="stats-row">
        <div class="stat-pill"><span class="dot dot-green"></span><span id="statKnown">0</span> hafal</div>
        <div class="stat-pill"><span class="dot dot-amber"></span><span id="statLeft">50</span> tersisa</div>
      </div>
    </div>

    <div id="flashMode" class="flash-area">
      <div class="flashcard" id="card" onclick="flipCard()">
        <div class="card-jp" id="cardJp"></div>
        <div class="card-hira" id="cardHira"></div>
        <div class="card-romaji" id="cardRomaji"></div>
        <div class="card-tap" id="cardTap">ketuk untuk lihat arti</div>
        <div class="card-meaning" id="cardMeaning" style="display:none"></div>
        <div class="card-meta" id="cardMeta" style="display:none"></div>
      </div>
      <div class="nav-row">
        <button class="nav-btn" onclick="prevCard()">← Prev</button>
        <span class="counter" id="counter">1 / 50</span>
        <button class="nav-btn" onclick="nextCard()">Next →</button>
      </div>
      <div class="action-row" id="actionRow" style="display:none">
        <button class="btn-know" onclick="markKnown()">✓ Hafal</button>
        <button class="btn-skip" onclick="nextCard()">Lewati</button>
      </div>
      <div class="keyboard-hint">Spasi = balik · → = next · ← = prev · H = hafal</div>
    </div>

    <div id="listMode" class="list-area" style="display:none">
      <table class="vocab-table">
        <thead>
          <tr>
            <th>Kanji</th>
            <th>Hiragana</th>
            <th>Romaji</th>
            <th>Arti</th>
            <th>Jenis</th>
            <th>Level</th>
          </tr>
        </thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
  </div>
</div>

const PD=50, TD=20;
let day=1, idx=0, flipped=false, known={}, mode='flash';

function dv(d){return V.slice((d-1)*PD, d*PD);}

function uGlobalStats(){
  const k=Object.values(known).filter(Boolean).length;
  document.getElementById('totalKnown').textContent=k;
  document.getElementById('totalPct').textContent=Math.round(k/V.length*100)+'%';
}

function uDayStats(){
  const v=dv(day), k=v.filter((_,i)=>known[(day-1)*PD+i]).length;
  const pct=Math.round(k/PD*100);
  document.getElementById('statKnown').textContent=k;
  document.getElementById('statLeft').textContent=PD-k;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLabel').textContent='Hari '+day;
  document.getElementById('progPct').textContent=pct+'%';
}

function renderDayList(){
  const el=document.getElementById('dayList');
  el.innerHTML='';
  for(let d=1;d<=TD;d++){
    const v=dv(d), k=v.filter((_,i)=>known[(d-1)*PD+i]).length;
    const done=k===PD;
    const div=document.createElement('div');
    div.className='day-item'+(d===day?' active':'')+(done?' done':'');
    div.innerHTML=`<span>Hari ${d}</span><span class="day-dot"></span>`;
    div.onclick=(()=>{const dd=d;return()=>selectDay(dd);})();
    el.appendChild(div);
  }
}

function selectDay(d){day=d;idx=0;flipped=false;renderDayList();renderCard();uDayStats();if(mode==='list')renderList();}

function renderCard(){
  const w=dv(day)[idx];
  const gi=(day-1)*PD+idx;
  document.getElementById('cardJp').textContent=w[0];
  document.getElementById('cardHira').textContent=w[1]!==w[0]?w[1]:'';
  document.getElementById('cardRomaji').textContent=w[2];
  document.getElementById('cardTap').textContent=flipped?'':'ketuk untuk lihat arti';
  const m=document.getElementById('cardMeaning');
  m.style.display=flipped?'block':'none';
  m.textContent=w[3];
  const meta=document.getElementById('cardMeta');
  meta.style.display=flipped?'flex':'none';
  if(flipped){
    meta.innerHTML=`<span class="badge badge-type">${w[4]}</span><span class="badge badge-${w[5].toLowerCase()}">${w[5]}</span>`;
  }
  document.getElementById('counter').textContent=(idx+1)+' / '+PD;
  document.getElementById('actionRow').style.display=flipped?'flex':'none';
  document.getElementById('card').className='flashcard'+(known[gi]?' known':'');
}

function flipCard(){flipped=!flipped;renderCard();}
function nextCard(){if(idx<PD-1){idx++;flipped=false;renderCard();}}
function prevCard(){if(idx>0){idx--;flipped=false;renderCard();}}
function markKnown(){
  known[(day-1)*PD+idx]=true;
  uDayStats();uGlobalStats();renderDayList();nextCard();
}

function setMode(m){
  mode=m;
  document.getElementById('tabFlash').className='tab'+(m==='flash'?' active':'');
  document.getElementById('tabList').className='tab'+(m==='list'?' active':'');
  document.getElementById('flashMode').style.display=m==='flash'?'flex':'none';
  document.getElementById('listMode').style.display=m==='list'?'block':'none';
  if(m==='list')renderList();
}

function renderList(){
  const v=dv(day), tb=document.getElementById('listBody');
  tb.innerHTML='';
  v.forEach((w,i)=>{
    const gi=(day-1)*PD+i, tr=document.createElement('tr');
    if(known[gi])tr.className='kn';
    tr.innerHTML=`
      <td class="cell-jp">${w[0]}</td>
      <td class="cell-hira">${w[1]}</td>
      <td class="cell-romaji">${w[2]}</td>
      <td>${w[3]}</td>
      <td><span class="badge badge-type">${w[4]}</span></td>
      <td><span class="badge badge-${w[5].toLowerCase()}">${w[5]}</span></td>`;
    tr.onclick=()=>{known[gi]=!known[gi];uDayStats();uGlobalStats();renderList();renderDayList();};
    tb.appendChild(tr);
  });
}

document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key===' '||e.key==='Enter'){e.preventDefault();flipCard();}
  else if(e.key==='ArrowRight') nextCard();
  else if(e.key==='ArrowLeft') prevCard();
  else if(e.key==='h'||e.key==='H'){if(flipped)markKnown();}
});

renderDayList(); renderCard(); uDayStats(); uGlobalStats();
</script>
</body>
</html>
